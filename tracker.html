<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Power BI Portfolio Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2a2d3e;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --blue:     #3b82f6;
      --blue-bg:  #1e3a5f;
      --red:      #ef4444;
      --red-bg:   #3b0f0f;
      --green:    #22c55e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #sidebar h1 {
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0 4px 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }

    .project-card {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .project-card:hover  { border-color: var(--blue); }
    .project-card.active { border-color: var(--blue); background: var(--blue-bg); }
    .project-card.future { opacity: 0.55; }

    .project-card-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .project-card-title span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .overdue-badge {
      background: var(--red);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .project-card-meta { font-size: 11px; color: var(--muted); margin-bottom: 6px; }

    .progress-bar-track { height: 4px; background: var(--border); border-radius: 2px; }

    .progress-bar-fill {
      height: 4px;
      background: var(--blue);
      border-radius: 2px;
      transition: width 0.3s;
    }

    /* ── Main panel ── */
    #main {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Today banner ── */
    .today-banner {
      background: var(--blue-bg);
      border: 1px solid var(--blue);
      border-radius: 8px;
      padding: 16px;
    }

    .today-banner.complete { background: #0f2d1a; border-color: var(--green); }
    .today-banner.future   { background: var(--surface); border-color: var(--border); }
    .today-banner.past     { background: var(--red-bg); border-color: var(--red); }

    .today-banner-label {
      font-size: 11px;
      color: var(--blue);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .today-banner.complete .today-banner-label { color: var(--green); }
    .today-banner.future   .today-banner-label { color: var(--muted); }
    .today-banner.past     .today-banner-label { color: var(--red); }

    .today-banner-heading { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .today-banner-task    { font-size: 13px; color: var(--muted); }

    /* ── Overdue alert ── */
    .overdue-banner {
      background: var(--red-bg);
      border: 1px solid var(--red);
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 13px;
      color: #fca5a5;
    }

    /* ── Phase sections ── */
    .phase-section { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }

    .phase-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      cursor: pointer;
      background: var(--surface);
      user-select: none;
      gap: 8px;
    }

    .phase-header:hover { background: #1e2130; }

    .phase-header-left { display: flex; align-items: center; gap: 8px; flex: 1; flex-wrap: wrap; }
    .phase-name        { font-weight: 600; font-size: 13px; }
    .phase-days-label  { font-size: 11px; color: var(--muted); }

    .phase-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 999px;
    }

    .phase-badge.today   { background: var(--blue); color: #fff; }
    .phase-badge.overdue { background: var(--red);  color: #fff; }

    .phase-chevron {
      font-size: 12px;
      color: var(--muted);
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .phase-section.open .phase-chevron { transform: rotate(180deg); }
    .phase-body                         { display: none; }
    .phase-section.open .phase-body     { display: block; }

    /* ── Day items ── */
    .day-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      border-left: 3px solid transparent;
    }

    .day-item.completed    { opacity: 0.5; }
    .day-item.today-item   { border-left-color: var(--blue); }
    .day-item.overdue-item { border-left-color: var(--red); }
    .day-item.upcoming     { opacity: 0.4; }

    .day-item input[type="checkbox"] {
      margin-top: 2px;
      flex-shrink: 0;
      cursor: pointer;
      accent-color: var(--blue);
    }

    .day-item input[type="checkbox"]:disabled { cursor: default; }

    .day-item-content { flex: 1; }

    .day-item-label {
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 2px;
    }

    .day-item.completed .day-item-label { text-decoration: line-through; color: var(--muted); }

    .day-tag {
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      text-transform: uppercase;
    }

    .day-tag.today   { background: var(--blue); color: #fff; }
    .day-tag.overdue { background: var(--red);  color: #fff; }

    .day-item-date { font-size: 11px; color: var(--muted); }

    /* ── Mobile ── */
    #mobile-select-wrap {
      display: none;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    #mobile-project-select {
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 14px;
    }

    @media (max-width: 640px) {
      body                { flex-direction: column; overflow: auto; height: auto; }
      #sidebar            { display: none; }
      #mobile-select-wrap { display: block; }
      #main               { padding: 12px; }
    }
  </style>
</head>
<body>

<aside id="sidebar">
  <h1>📊 Portfolio Tracker</h1>
  <div id="project-list"></div>
</aside>

<div id="mobile-select-wrap">
  <select id="mobile-project-select"></select>
</div>

<main id="main">
  <div id="loading" style="color:var(--muted);padding:40px 0;text-align:center">Loading…</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

// ── 1. CONFIG ──────────────────────────────────────────────────────────────────────────────────
const SUPABASE_URL  = 'https://vxbylefdrmcdbngvpjnt.supabase.co';
const SUPABASE_ANON = 'sb_publishable_F80mIoy9BPxjsCGq0QEaeg_GgqrK1-D';

// ── 2. PROJECT DATA ──────────────────────────────────────────────────────────────────────────
const PHASES = [
  { days: [1, 2],        name: 'Brief & Data Sourcing',   task: 'Define 3 business questions, download and inspect raw dataset' },
  { days: [3, 4],        name: 'Data Prep (ETL)',          task: 'Clean in Python/SQL or Power Query, build staging tables, load to Power BI' },
  { days: [5, 6],        name: 'Data Modeling',            task: 'Set relationships, define star schema, create date table' },
  { days: [7, 8, 9],    name: 'DAX Layer',                task: 'Write KPI measures, YoY%, rolling averages, rankings' },
  { days: [10, 11, 12], name: 'Dashboard Build',           task: 'Design report pages, apply theme, add slicers and tooltips' },
  { days: [13],          name: 'Insight Writing',          task: 'Write 3–5 key findings — the “so what” of the data' },
  { days: [14],          name: 'README & Documentation',   task: 'Write GitHub README with business context, screenshots, DAX samples' },
  { days: [15],          name: 'Polish & Publish',         task: 'Final QA, export screenshots, push to GitHub' },
];

const EMOJIS = ['🛒', '👥', '🌍', '💰', '🚚', '⚡'];

const BASE = new Date('2026-06-04');

const PROJECTS = [
  { title: 'E-Commerce Sales Performance',   slug: 'powerbi-ecommerce-sales',  dataset: 'Olist Brazilian E-Commerce (Kaggle)' },
  { title: 'HR Attrition & Workforce',       slug: 'powerbi-hr-attrition',     dataset: 'IBM HR Analytics (Kaggle)' },
  { title: 'Global COVID-19 Impact Tracker', slug: 'powerbi-covid-tracker',    dataset: 'Our World in Data — COVID' },
  { title: 'Financial Budget vs Actual',     slug: 'powerbi-finance-budget',   dataset: 'AdventureWorks (Microsoft sample)' },
  { title: 'Supply Chain Delivery',          slug: 'powerbi-supply-chain',     dataset: 'DataCo Supply Chain (Kaggle)' },
  { title: 'Energy & Sustainability',        slug: 'powerbi-energy-esg',       dataset: 'Our World in Data — Energy' },
].map((def, i) => {
  const startDate = new Date(BASE);
  startDate.setDate(BASE.getDate() + i * 15);
  return { ...def, emoji: EMOJIS[i], startDate, phases: PHASES };
});

// ── 3. HELPERS ──────────────────────────────────────────────────────────────────────────────────
function today() {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  return d;
}

function getDayDate(project, day) {
  const d = new Date(project.startDate);
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() + day - 1);
  return d;
}

function getTodayDay(project) {
  const t = today();
  const s = new Date(project.startDate);
  s.setHours(0, 0, 0, 0);
  const diff = Math.floor((t - s) / 86400000) + 1;
  return diff >= 1 && diff <= 15 ? diff : null;
}

function getOverdueDays(project, completedDays) {
  const t = today();
  const overdue = [];
  for (let day = 1; day <= 15; day++) {
    const dayDate = getDayDate(project, day);
    if (dayDate < t && !completedDays.includes(day)) {
      overdue.push(day);
    }
  }
  return overdue;
}

function isFuture(project) {
  const s = new Date(project.startDate);
  s.setHours(0, 0, 0, 0);
  return today() < s;
}

function daysUntilStart(project) {
  const s = new Date(project.startDate);
  s.setHours(0, 0, 0, 0);
  return Math.ceil((s - today()) / 86400000);
}

function formatDate(date) {
  return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

// ── 4. SUPABASE CLIENT ──────────────────────────────────────────────────────────────────────────
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);

// ── 5. IN-MEMORY STATE ─────────────────────────────────────────────────────────────────────────
// { [slug]: number[] }  — completed day numbers per project
const state = {};
PROJECTS.forEach(p => { state[p.slug] = []; });

let activeSlug = PROJECTS[0].slug;

// ── 6. LOAD + SAVE ───────────────────────────────────────────────────────────────────────────────
async function loadProgress() {
  const { data, error } = await db.from('progress').select('*');
  if (error) { console.error('Load error:', error); return; }

  const existing = new Set((data || []).map(r => r.project_slug));
  const missing = PROJECTS.filter(p => !existing.has(p.slug));
  if (missing.length) {
    await db.from('progress').upsert(
      missing.map(p => ({ project_slug: p.slug, completed_days: [] }))
    );
  }

  (data || []).forEach(row => {
    if (state[row.project_slug] !== undefined) {
      state[row.project_slug] = row.completed_days || [];
    }
  });
}

async function saveProgress(slug) {
  const { error } = await db.from('progress').upsert({
    project_slug: slug,
    completed_days: state[slug],
    updated_at: new Date().toISOString(),
  });
  if (error) console.error('Save error:', error);
}

// ── 7. RENDER STUBS + INIT ────────────────────────────────────────────────────────────────────────
function render() {
  renderSidebar();
  renderMain();
}

function renderSidebar() {
  const list = document.getElementById('project-list');
  list.innerHTML = PROJECTS.map(p => {
    const completedDays = state[p.slug];
    const overdueDays   = getOverdueDays(p, completedDays);
    const future        = isFuture(p);
    const active        = p.slug === activeSlug;

    const badge = overdueDays.length
      ? `<span class="overdue-badge">${overdueDays.length}</span>`
      : '';

    let metaHtml;
    if (future) {
      metaHtml = `<div class="project-card-meta">Starts ${formatDate(p.startDate)}</div>`;
    } else {
      metaHtml = `
        <div class="project-card-meta">${completedDays.length} / 15 days</div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" style="width:${(completedDays.length / 15 * 100).toFixed(1)}%"></div>
        </div>`;
    }

    return `
      <div class="project-card${active ? ' active' : ''}${future ? ' future' : ''}"
           data-slug="${p.slug}">
        <div class="project-card-title">
          <span>${p.emoji} ${p.title}</span>
          ${badge}
        </div>
        ${metaHtml}
      </div>`;
  }).join('');

  const sel = document.getElementById('mobile-project-select');
  sel.innerHTML = PROJECTS.map(p =>
    `<option value="${p.slug}"${p.slug === activeSlug ? ' selected' : ''}>${p.emoji} ${p.title}</option>`
  ).join('');
}

function bindProjectSelection() {
  document.getElementById('project-list').addEventListener('click', e => {
    const card = e.target.closest('[data-slug]');
    if (!card) return;
    activeSlug = card.dataset.slug;
    render();
  });

  document.getElementById('mobile-project-select').addEventListener('change', e => {
    activeSlug = e.target.value;
    render();
  });
}

function renderTodayBanner(project, completedDays) {
  if (isFuture(project)) {
    const days = daysUntilStart(project);
    return `
      <div class="today-banner future">
        <div class="today-banner-label">Upcoming project</div>
        <div class="today-banner-heading">Starts in ${days} day${days !== 1 ? 's' : ''}</div>
        <div class="today-banner-task">${formatDate(project.startDate)}</div>
      </div>`;
  }

  if (completedDays.length === 15) {
    return `
      <div class="today-banner complete">
        <div class="today-banner-label">✅ Project complete</div>
        <div class="today-banner-heading">${project.title}</div>
        <div class="today-banner-task">All 15 days completed</div>
      </div>`;
  }

  const todayDay = getTodayDay(project);

  if (!todayDay) {
    return `
      <div class="today-banner past">
        <div class="today-banner-label">Past deadline</div>
        <div class="today-banner-heading">${project.title}</div>
        <div class="today-banner-task">${completedDays.length} / 15 days completed</div>
      </div>`;
  }

  const phase = project.phases.find(ph => ph.days.includes(todayDay));
  if (!phase) return '';
  return `
    <div class="today-banner">
      <div class="today-banner-label">📅 Today — Day ${todayDay} · ${formatDate(getDayDate(project, todayDay))}</div>
      <div class="today-banner-heading">${phase.name}</div>
      <div class="today-banner-task">${phase.task}</div>
    </div>`;
}

function renderOverdueBanner(project, completedDays) {
  const overdue = getOverdueDays(project, completedDays);
  if (!overdue.length) return '';

  const dayList = overdue.map(d => `Day ${d}`).join(', ');
  return `
    <div class="overdue-banner">
      ⚠️ <strong>${overdue.length} overdue day${overdue.length > 1 ? 's' : ''}</strong>
      — ${dayList} ${overdue.length > 1 ? 'were' : 'was'} not marked complete
    </div>`;
}

function renderDayItem(project, day, completedDays) {
  const todayDay    = getTodayDay(project);
  const dayDate     = getDayDate(project, day);
  const t           = today();
  const isCompleted = completedDays.includes(day);
  const isToday     = day === todayDay;
  const isOverdue   = dayDate < t && !isCompleted && !isToday;
  const isUpcoming  = dayDate >= t && !isToday && !isCompleted;

  let cls      = 'day-item';
  let tag      = '';
  let disabled = '';

  if (isCompleted)     { cls += ' completed'; }
  else if (isToday)    { cls += ' today-item';   tag = '<span class="day-tag today">TODAY</span>'; }
  else if (isOverdue)  { cls += ' overdue-item'; tag = '<span class="day-tag overdue">OVERDUE</span>'; }
  else if (isUpcoming) { cls += ' upcoming'; disabled = 'disabled'; }

  return `
    <div class="${cls}">
      <input type="checkbox"
             ${isCompleted ? 'checked' : ''}
             ${disabled}
             data-slug="${project.slug}"
             data-day="${day}">
      <div class="day-item-content">
        <div class="day-item-label">Day ${day} ${tag}</div>
        <div class="day-item-date">${formatDate(dayDate)}</div>
      </div>
    </div>`;
}

function renderPhases(project, completedDays) {
  const todayDay = getTodayDay(project);
  const t        = today();

  return project.phases.map(phase => {
    const hasToday       = todayDay !== null && phase.days.includes(todayDay);
    const overdueInPhase = phase.days.filter(d => getDayDate(project, d) < t && !completedDays.includes(d));
    const isOpen         = hasToday || overdueInPhase.length > 0;

    const badges = [
      hasToday             ? '<span class="phase-badge today">TODAY</span>'                               : '',
      overdueInPhase.length ? `<span class="phase-badge overdue">${overdueInPhase.length} overdue</span>` : '',
    ].join('');

    const first    = phase.days[0];
    const last     = phase.days[phase.days.length - 1];
    const dayRange = first === last ? `Day ${first}` : `Days ${first}–${last}`;

    const items = phase.days.map(d => renderDayItem(project, d, completedDays)).join('');

    return `
      <div class="phase-section${isOpen ? ' open' : ''}">
        <div class="phase-header">
          <div class="phase-header-left">
            <span class="phase-name">${phase.name}</span>
            <span class="phase-days-label">${dayRange}</span>
            ${badges}
          </div>
          <span class="phase-chevron">▼</span>
        </div>
        <div class="phase-body">${items}</div>
      </div>`;
  }).join('');
}

function renderMain() {
  const main          = document.getElementById('main');
  const project       = PROJECTS.find(p => p.slug === activeSlug);
  const completedDays = state[activeSlug];

  main.innerHTML = `
    ${renderTodayBanner(project, completedDays)}
    ${renderOverdueBanner(project, completedDays)}
    ${renderPhases(project, completedDays)}
  `;
}

async function toggleDay(slug, day) {
  const days = state[slug];
  if (days.includes(day)) {
    state[slug] = days.filter(d => d !== day);
  } else {
    state[slug] = [...days, day];
  }
  render();
  await saveProgress(slug);
}

function bindMainHandlers() {
  document.getElementById('main').addEventListener('click', e => {
    const header = e.target.closest('.phase-header');
    if (header) {
      header.closest('.phase-section').classList.toggle('open');
    }
  });

  document.getElementById('main').addEventListener('change', e => {
    if (e.target.type !== 'checkbox') return;
    const { slug, day } = e.target.dataset;
    toggleDay(slug, parseInt(day, 10));
  });
}

// ── 11. NOTIFICATIONS ─────────────────────────────────────────────────────────────────────────
async function requestNotifications() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    await Notification.requestPermission();
  }
}

function fireOverdueNotifications() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;

  PROJECTS.forEach(project => {
    getOverdueDays(project, state[project.slug]).forEach(day => {
      const key = `notified:${project.slug}:${day}`;
      if (sessionStorage.getItem(key)) return;
      new Notification('⚠️ Power BI Tracker', {
        body: `${project.title} — Day ${day} is overdue`,
      });
      sessionStorage.setItem(key, '1');
    });
  });
}

function checkOverdue() {
  render();
  fireOverdueNotifications();
}

async function init() {
  await loadProgress();
  document.getElementById('loading').remove();
  bindProjectSelection();
  bindMainHandlers();
  render();
  await requestNotifications();
  fireOverdueNotifications();
  setInterval(checkOverdue, 60 * 60 * 1000);
}

init();

</script>
</body>
</html>
